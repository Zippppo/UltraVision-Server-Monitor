<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>H20B Storage Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Remote storage</p>
        <h1>H20B Storage Monitor</h1>
        <p id="subtitle" class="muted">Waiting for data...</p>
      </div>
    </header>

    <main>
      <section class="tool-panel" aria-label="GPU usage">
        <div class="panel-head">
          <div>
            <h2>GPU usage</h2>
            <p id="gpuHint" class="muted">Waiting for GPU data...</p>
          </div>
        </div>
        <div id="gpuOverview" class="gpu-overview"></div>
      </section>
      <section id="cards" class="metric-grid" aria-label="Folder usage"></section>
      <section id="totalOverview" class="total-overview" aria-label="User total usage"></section>

      <section class="tool-panel" aria-label="GPU occupancy trend">
        <div class="panel-head">
          <div>
            <h2>GPU occupancy trend</h2>
            <p id="chartHint" class="muted">GPU history will appear after scheduled runs.</p>
          </div>
          <div class="panel-actions">
            <div class="segmented-control" role="group" aria-label="Trend range">
              <button class="segment-button active" type="button" data-trend-days="7">7 days</button>
              <button class="segment-button" type="button" data-trend-days="30">30 days</button>
            </div>
            <button id="refreshButton" class="icon-button" type="button" title="Refresh now" aria-label="Refresh now">
              <span aria-hidden="true">Refresh</span>
            </button>
          </div>
        </div>
        <canvas id="trendCanvas" height="320"></canvas>
      </section>

    </main>
  </body>
</html>
